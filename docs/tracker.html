<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress Tracker — Interview Prep Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css" />
<style>
/* ── Tracker Shell ──────────────────────────────────────── */
.tracker-layout {
  display: grid;
  grid-template-columns: 256px 1fr;
  height: calc(100vh - 62px);
  overflow: hidden;
}

/* ── Sidebar ────────────────────────────────────────────── */
.t-sidebar {
  background: var(--surface-1);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}
.t-sidebar-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0;
}
.t-sidebar-footer {
  border-top: 1px solid var(--border);
  padding: 14px 16px;
  flex-shrink: 0;
}

.t-sb-section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  padding: 8px 16px 6px;
}

.t-sb-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 9px 16px;
  background: none;
  border: none;
  border-left: 3px solid transparent;
  text-align: left;
  cursor: pointer;
  color: var(--text-2);
  font-family: var(--font-sans);
  transition: background 0.15s, color 0.15s;
}
.t-sb-btn:hover { background: var(--surface-2); }
.t-sb-btn.active {
  background: var(--surface-2);
  border-left-color: var(--cyan);
  color: var(--text-1);
}

.t-sb-icon { font-size: 1.1rem; flex-shrink: 0; line-height: 1; }
.t-sb-info { flex: 1; min-width: 0; }
.t-sb-title {
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}
.t-sb-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
  margin-top: 2px;
}
.t-sb-bar-wrap {
  width: 28px;
  height: 3px;
  background: var(--surface-3, #1e2d45);
  border-radius: 2px;
  overflow: hidden;
  flex-shrink: 0;
}
.t-sb-bar-fill { height: 100%; border-radius: 2px; transition: width 0.35s; }

.t-sb-divider { height: 1px; background: var(--border); margin: 8px 16px; }

/* footer stats */
.t-sb-stat-row { display: flex; gap: 8px; margin-bottom: 10px; }
.t-sb-stat-box {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 6px;
  text-align: center;
}
.t-sb-stat-num {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  font-weight: 700;
  line-height: 1;
}
.t-sb-stat-lbl {
  font-family: var(--font-mono);
  font-size: 9px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 3px;
}

.io-btn {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 6px 11px;
  border-radius: 6px;
  border: 1px solid var(--border-mid);
  cursor: pointer;
  background: var(--surface-2);
  color: var(--text-2);
  transition: all 0.15s;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  text-decoration: none;
}
.io-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.io-btn.danger:hover { border-color: var(--red); color: var(--red); }
.io-row { display: flex; gap: 6px; flex-wrap: wrap; }
#import-file { display: none; }

/* ── Main Area ──────────────────────────────────────────── */
.t-main {
  overflow-y: auto;
  padding: 32px clamp(20px, 4vw, 48px);
  height: 100%;
}

/* ── Section Blocks ─────────────────────────────────────── */
.t-section { margin-bottom: 40px; }
.t-section-title {
  font-size: 11px;
  font-family: var(--font-mono);
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.t-section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Overview Stats Row ─────────────────────────────────── */
.ov-stats-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 32px;
}
.ov-stat-box {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px 12px;
  text-align: center;
}
.ov-stat-num {
  font-family: var(--font-mono);
  font-size: 1.7rem;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 6px;
}
.ov-stat-lbl {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* Overall progress bar */
.ov-progress-wrap {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  margin-bottom: 32px;
}
.ov-progress-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}
.ov-progress-label {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.ov-progress-pct {
  font-family: var(--font-mono);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--green);
}
.ov-progress-bar {
  height: 8px;
  background: var(--surface-2);
  border-radius: 4px;
  overflow: hidden;
}
.ov-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--cyan), var(--green));
  border-radius: 4px;
  transition: width 0.5s ease;
}

/* ── Topic Overview Cards ───────────────────────────────── */
.ov-topic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.ov-topic-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.18s;
  border-left: 3px solid var(--card-accent, var(--border-mid));
  text-decoration: none;
  color: inherit;
  display: block;
}
.ov-topic-card:hover {
  border-color: var(--border-bright);
  border-left-color: var(--card-accent, var(--cyan));
  background: var(--surface-2);
  transform: translateX(3px);
}
.ov-topic-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  gap: 8px;
}
.ov-topic-name-row { display: flex; align-items: center; gap: 8px; }
.ov-topic-icon { font-size: 1.2rem; }
.ov-topic-name { font-size: 13px; font-weight: 700; color: var(--text-1); }
.ov-topic-pct {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
}
.ov-topic-bar {
  height: 4px;
  background: var(--surface-2);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 10px;
}
.ov-topic-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
.ov-topic-stats {
  display: flex;
  gap: 12px;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
}
.ov-topic-stat span { font-weight: 600; }

/* ── Weakness / Review Items ────────────────────────────── */
.weak-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-left: 3px solid var(--red);
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
  color: inherit;
}
.weak-item:hover { border-color: rgba(239,68,68,0.4); background: var(--surface-2); }
.weak-item-topic {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  min-width: 72px;
  flex-shrink: 0;
}
.weak-item-title { font-size: 13px; font-weight: 600; color: var(--text-1); flex: 1; }
.weak-item-arrow { color: var(--text-3); font-size: 14px; transition: transform 0.15s; }
.weak-item:hover .weak-item-arrow { transform: translateX(3px); color: var(--red); }

/* low-confidence uses amber instead */
.lowconf-item { border-left-color: var(--amber); }
.lowconf-item:hover { border-color: rgba(245,158,11,0.4); }
.lowconf-dots { display: flex; gap: 3px; flex-shrink: 0; }
.lowconf-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border-mid); }
.lowconf-dot.filled { background: var(--amber); }

/* ── Recommendations ────────────────────────────────────── */
.rec-list { display: flex; flex-direction: column; gap: 8px; }
.rec-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.rec-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
.rec-text { font-size: 13px; color: var(--text-2); line-height: 1.5; }
.rec-text strong { color: var(--text-1); }
.rec-action {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--cyan);
  cursor: pointer;
  margin-left: auto;
  flex-shrink: 0;
  align-self: center;
  padding: 4px 10px;
  border: 1px solid rgba(0,212,255,0.3);
  border-radius: 4px;
  transition: all 0.15s;
  white-space: nowrap;
  background: none;
}
.rec-action:hover { background: rgba(0,212,255,0.1); }

/* ── Topic View Header ──────────────────────────────────── */
.tv-header {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.tv-icon-wrap {
  width: 52px; height: 52px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
  flex-shrink: 0;
}
.tv-title { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.02em; color: var(--text-1); }
.tv-desc { font-size: 13px; color: var(--text-2); margin-top: 4px; max-width: 560px; }
.tv-stats-row {
  display: flex; gap: 16px; flex-wrap: wrap;
  margin-top: 10px;
}
.tv-stat {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-3);
  display: flex; align-items: center; gap: 5px;
}
.tv-stat strong { color: var(--text-2); }

.tv-progress-wrap { margin-bottom: 32px; }
.tv-progress-bar {
  height: 6px;
  background: var(--surface-2);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}
.tv-progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s;
}

/* ── Concept Cards (Tracker) ────────────────────────────── */
.t-group-title {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin: 24px 0 10px;
  display: flex; align-items: center; gap: 10px;
}
.t-group-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.t-card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-left: 3px solid var(--card-border, var(--border-mid));
  border-radius: 10px;
  margin-bottom: 8px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.t-card[data-status="in-progress"] { --card-border: var(--amber); }
.t-card[data-status="done"]        { --card-border: var(--green); }
.t-card[data-status="review"]      { --card-border: var(--red); }
.t-card[data-status="not-started"] { --card-border: #2a3040; }

.t-card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  cursor: pointer;
  user-select: none;
}
.t-card-header:hover .t-card-title { color: var(--cyan); }

.t-status-badge {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 4px;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.15s;
  flex-shrink: 0;
  letter-spacing: 0.03em;
  border: 1px solid transparent;
}
.t-status-badge:hover { opacity: 0.8; transform: scale(0.97); }
.t-status-badge.not-started {
  background: rgba(255,255,255,0.04); border-color: #2a3040; color: var(--text-3);
}
.t-status-badge.in-progress {
  background: rgba(245,158,11,0.14); border-color: var(--amber); color: var(--amber);
}
.t-status-badge.done {
  background: rgba(16,185,129,0.14); border-color: var(--green); color: var(--green);
}
.t-status-badge.review {
  background: rgba(239,68,68,0.14); border-color: var(--red); color: var(--red);
}

.t-card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-1);
  flex: 1;
  min-width: 0;
  transition: color 0.15s;
}

.t-conf-wrap { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
.t-conf-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  border: 1px solid #2a3040;
  background: transparent;
  cursor: pointer;
  transition: all 0.12s;
  flex-shrink: 0;
}
.t-conf-dot:hover { transform: scale(1.3); }
.t-conf-dot.c1.filled { background: var(--red);    border-color: var(--red); }
.t-conf-dot.c2.filled { background: var(--red);    border-color: var(--red); }
.t-conf-dot.c3.filled { background: var(--amber);  border-color: var(--amber); }
.t-conf-dot.c4.filled { background: var(--green);  border-color: var(--green); }
.t-conf-dot.c5.filled { background: var(--cyan);   border-color: var(--cyan); }

.t-card-chevron {
  color: var(--text-3);
  font-size: 11px;
  flex-shrink: 0;
  transition: transform 0.2s;
  font-family: var(--font-mono);
}
.t-card-chevron.open { transform: rotate(180deg); }

.t-card-body {
  padding: 12px 14px 14px;
  border-top: 1px solid var(--border);
  display: none;
}
.t-card-body.open { display: block; }

.t-card-subtitle {
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.6;
  margin-bottom: 12px;
}

.t-note-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 5px;
}
.t-note-area {
  width: 100%;
  background: var(--surface-2);
  border: 1px solid var(--border-mid);
  border-radius: 6px;
  padding: 10px 12px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-1);
  resize: vertical;
  min-height: 68px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 10px;
  line-height: 1.6;
}
.t-note-area::placeholder { color: var(--text-3); }
.t-note-area:focus { border-color: rgba(0,212,255,0.35); }

.t-card-footer-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  flex-wrap: wrap;
}
.t-last-studied {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
}
.t-study-link {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--cyan);
  text-decoration: none;
  border: 1px solid rgba(0,212,255,0.25);
  padding: 3px 9px;
  border-radius: 4px;
  transition: all 0.15s;
}
.t-study-link:hover { background: rgba(0,212,255,0.1); }

/* ── Confidence legend ──────────────────────────────────── */
.conf-legend {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-3);
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.conf-legend-item { display: flex; align-items: center; gap: 4px; }
.conf-legend-dot {
  width: 8px; height: 8px; border-radius: 50%;
}

/* ── Toast ──────────────────────────────────────────────── */
.t-toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface-2);
  border: 1px solid var(--green);
  color: var(--green);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 10px 18px;
  border-radius: 8px;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.t-toast.show { opacity: 1; }

/* ── Empty states ───────────────────────────────────────── */
.t-empty {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-3);
  padding: 12px 0;
}

/* ── Responsive ─────────────────────────────────────────── */
@media (max-width: 768px) {
  .tracker-layout { grid-template-columns: 1fr; height: auto; overflow: visible; }
  .t-sidebar { height: auto; max-height: 45vh; }
  .t-main { height: auto; overflow: visible; }
  .ov-stats-row { grid-template-columns: repeat(3, 1fr); }
  .ov-topic-grid { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .ov-stats-row { grid-template-columns: repeat(2, 1fr); }
}

/* scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface-3, #1e2d45); border-radius: 3px; }
</style>
</head>

<!-- ── Navigation ──────────────────────────────────────── -->
<nav class="site-nav">
  <div class="nav-inner">
    <a class="nav-logo" href="index.html">
      <div class="nav-logo-icon">⚡</div>
      <span class="nav-logo-text">Prep<span>Hub</span></span>
    </a>
    <div class="nav-links">
      <a class="nav-link" href="java/">Java</a>
      <a class="nav-link" href="spring-boot/">Spring</a>
      <a class="nav-link" href="sql/">SQL</a>
      <a class="nav-link" href="system-design/">System Design</a>
      <a class="nav-link" href="javascript/">JS</a>
      <a class="nav-link" href="react/">React</a>
      <a class="nav-link" href="cloud/">Cloud</a>
      <a class="nav-link" href="behavioral/">Behavioral</a>
    </div>
    <div class="nav-right">
      <span class="nav-link active" style="color:var(--green)">📊 Tracker</span>
      <a class="nav-home-btn" href="index.html">← All Topics</a>
    </div>
  </div>
</nav>

<div class="t-toast" id="t-toast"></div>

<!-- ── Tracker Layout ───────────────────────────────────── -->
<div class="tracker-layout">

  <!-- Sidebar -->
  <aside class="t-sidebar">
    <div class="t-sidebar-scroll">
      <div class="t-sb-section-label">Navigation</div>

      <button class="t-sb-btn active" id="sb-overview" onclick="showView('overview')">
        <span class="t-sb-icon">📊</span>
        <div class="t-sb-info">
          <div class="t-sb-title">Overview Dashboard</div>
          <div class="t-sb-sub">Stats & weak spots</div>
        </div>
      </button>

      <div class="t-sb-divider"></div>
      <div class="t-sb-section-label">Topics</div>
      <div id="sb-topics"></div>
    </div>

    <!-- Sidebar footer: quick stats + io -->
    <div class="t-sidebar-footer">
      <div class="t-sb-stat-row" id="sb-overall-stats"></div>
      <div class="io-row">
        <button class="io-btn" onclick="exportData()" title="Export all progress as JSON">↓ Export</button>
        <label class="io-btn" title="Import progress from JSON backup">
          ↑ Import
          <input type="file" id="import-file" accept=".json" onchange="importData(event)">
        </label>
        <button class="io-btn danger" onclick="confirmReset()" title="Reset all progress">⟳ Reset</button>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="t-main" id="t-main">
    <!-- Rendered by JS -->
  </main>

</div><!-- end tracker-layout -->

<script src="data.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════
   INTERVIEW PREP HUB — Progress Tracker
   All state stored in localStorage under TRACKER_KEY.
   Derives all topic/concept data from data.js (SITE_DATA).
   ═══════════════════════════════════════════════════════════ */

const TRACKER_KEY = 'iph_tracker_v1';

const STATUS_CYCLE  = ['not-started', 'in-progress', 'done', 'review'];
const STATUS_LABELS = {
  'not-started': '○ Not Started',
  'in-progress': '~ In Progress',
  'done':        '✓ Done',
  'review':      '⚑ Review'
};
const STATUS_SHORT = {
  'not-started': '○ TODO',
  'in-progress': '~ WIP',
  'done':        '✓ DONE',
  'review':      '⚑ REVIEW'
};
const CONF_LABELS = ['', 'Shaky', 'Familiar', 'Solid', 'Strong', 'Expert'];

let state       = {};
let currentView = 'overview';
let noteDebouncers = {};

/* ── Storage ─────────────────────────────────────────────── */

function loadState() {
  try { state = JSON.parse(localStorage.getItem(TRACKER_KEY) || '{}'); }
  catch { state = {}; }
}

function saveState() {
  try { localStorage.setItem(TRACKER_KEY, JSON.stringify(state)); }
  catch { showToast('⚠ Storage failed — browser may be blocking localStorage', true); }
}

/* ── Concept State Access ────────────────────────────────── */

function cKey(topicId, title) {
  return `${topicId}::${title}`;
}

function getC(topicId, title) {
  const k = cKey(topicId, title);
  if (!state[k]) {
    state[k] = { status: 'not-started', confidence: 0, notes: '', lastStudied: null };
  }
  return state[k];
}

function setC(topicId, title, updates) {
  const k = cKey(topicId, title);
  if (!state[k]) state[k] = { status: 'not-started', confidence: 0, notes: '', lastStudied: null };
  Object.assign(state[k], updates);
  // stamp last-studied whenever status changes away from not-started
  if (updates.status && updates.status !== 'not-started') {
    state[k].lastStudied = todayStr();
  }
  saveState();
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

/* ── Stats ───────────────────────────────────────────────── */

function topicStats(topicId) {
  const topic = getTopicById(topicId);
  if (!topic) return null;
  let total = 0, done = 0, inProgress = 0, review = 0, notStarted = 0;
  let confSum = 0, confCount = 0;
  topic.groups.forEach(g => {
    g.concepts.forEach(c => {
      total++;
      const s = getC(topicId, c.title);
      if      (s.status === 'done')        done++;
      else if (s.status === 'in-progress') inProgress++;
      else if (s.status === 'review')      review++;
      else                                 notStarted++;
      if (s.confidence > 0) { confSum += s.confidence; confCount++; }
    });
  });
  const pct     = total ? Math.round((done / total) * 100) : 0;
  const avgConf = confCount ? (confSum / confCount) : 0;
  return { total, done, inProgress, review, notStarted, pct, avgConf };
}

function overallStats() {
  let total = 0, done = 0, inProgress = 0, review = 0, notStarted = 0;
  SITE_DATA.topics.forEach(t => {
    const s = topicStats(t.id);
    total      += s.total;
    done       += s.done;
    inProgress += s.inProgress;
    review     += s.review;
    notStarted += s.notStarted;
  });
  const pct = total ? Math.round((done / total) * 100) : 0;
  return { total, done, inProgress, review, notStarted, pct };
}

/* ── URL helper ──────────────────────────────────────────── */

function conceptUrl(topic, concept) {
  if (!concept.file || concept.status === 'placeholder') return null;
  // file paths in data.js are relative to the topic subfolder
  // tracker.html is at root, so rebase them
  const f = concept.file;
  if (f.startsWith('../')) return f.replace('../', '');  // root-level file
  return topic.path + f;                                  // e.g. java/oop.html
}

/* ── Color helpers ───────────────────────────────────────── */

function pctColor(pct) {
  if (pct >= 70) return 'var(--green)';
  if (pct >= 35) return 'var(--amber)';
  return 'var(--red)';
}

function confColor(conf) {
  if (conf >= 4) return 'var(--green)';
  if (conf >= 3) return 'var(--amber)';
  return 'var(--red)';
}

/* ── Build Recommendations ───────────────────────────────── */

function buildRecommendations(ov, topicsWithStats, reviewItems, lowConfItems) {
  const recs = [];

  // Not started at all
  const untouched = topicsWithStats.filter(({ stats }) => stats.done === 0 && stats.inProgress === 0);
  if (untouched.length > 0) {
    const t = untouched[0].topic;
    recs.push({
      icon: '🚀',
      text: `You haven't started <strong>${t.title}</strong> yet. It has ${untouched[0].stats.total} concepts.`,
      action: 'Start now →',
      actionId: t.id
    });
  }

  // Highest review count
  if (reviewItems.length > 0) {
    const topicReviewCounts = {};
    reviewItems.forEach(({ topic }) => {
      topicReviewCounts[topic.id] = (topicReviewCounts[topic.id] || 0) + 1;
    });
    const [worstTopicId] = Object.entries(topicReviewCounts).sort((a, b) => b[1] - a[1])[0];
    const worstTopic = getTopicById(worstTopicId);
    recs.push({
      icon: '⚑',
      text: `<strong>${worstTopic.title}</strong> has ${topicReviewCounts[worstTopicId]} concept(s) marked for review. Revisit and practice those.`,
      action: 'Revisit →',
      actionId: worstTopicId
    });
  }

  // Weakest topic by %
  const weakest = topicsWithStats.find(({ stats }) => stats.total > 0 && stats.pct < 30 && stats.done > 0);
  if (weakest) {
    recs.push({
      icon: '📉',
      text: `<strong>${weakest.topic.title}</strong> is your weakest topic at ${weakest.stats.pct}% done. Dedicate focused time to it.`,
      action: 'Focus →',
      actionId: weakest.topic.id
    });
  }

  // Low confidence
  if (lowConfItems.length > 0) {
    recs.push({
      icon: '🎯',
      text: `${lowConfItems.length} concept(s) have low confidence. Consider doing practice problems or re-reading notes on those.`,
      action: null
    });
  }

  // Almost done topic
  const almostDone = topicsWithStats.slice().reverse().find(({ stats }) => stats.pct >= 70 && stats.pct < 100);
  if (almostDone) {
    const remaining = almostDone.stats.total - almostDone.stats.done;
    recs.push({
      icon: '🏁',
      text: `<strong>${almostDone.topic.title}</strong> is ${almostDone.stats.pct}% done — only ${remaining} concept(s) left. Finish it off!`,
      action: 'Finish →',
      actionId: almostDone.topic.id
    });
  }

  // Positive message
  if (ov.pct >= 80) {
    recs.push({ icon: '🎉', text: `<strong>Outstanding!</strong> You've completed ${ov.pct}% of all concepts. You're interview-ready — keep reviewing your weak spots!`, action: null });
  } else if (ov.pct >= 50) {
    recs.push({ icon: '💪', text: `<strong>Solid progress!</strong> You're ${ov.pct}% through the full curriculum. Keep the momentum going.`, action: null });
  } else if (ov.done === 0) {
    recs.push({ icon: '👋', text: `<strong>Welcome!</strong> Mark concepts as Done, In Progress, or Needs Review as you study. Your progress will persist between sessions.`, action: null });
  }

  return recs.slice(0, 5);
}

/* ── Render: Concept Card ────────────────────────────────── */

function renderConceptCard(topic, concept) {
  const cs     = getC(topic.id, concept.title);
  const status = cs.status;
  const conf   = cs.confidence;
  const notes  = cs.notes || '';
  const url    = conceptUrl(topic, concept);
  const tid    = encodeURIComponent(topic.id);
  const cid    = encodeURIComponent(concept.title);

  const dotHtml = Array.from({ length: 5 }, (_, i) => {
    const lvl = i + 1;
    const filled = lvl <= conf;
    const cls = `c${lvl}`;
    return `<div class="t-conf-dot ${cls}${filled ? ' filled' : ''}"
                 title="${CONF_LABELS[lvl]}"
                 onclick="event.stopPropagation(); setConfidence('${tid}','${cid}',${lvl},this.closest('.t-card'))"></div>`;
  }).join('');

  const lastStudied = cs.lastStudied
    ? `Last studied: ${cs.lastStudied}`
    : 'Not yet studied';

  const safeCid = CSS.escape ? CSS.escape(cid) : cid;

  return `
    <div class="t-card" data-status="${status}" id="card-${tid}-${cid.replace(/[^a-z0-9]/gi,'_')}">
      <div class="t-card-header" onclick="toggleCard(this)">

        <span class="t-status-badge ${status}"
              onclick="event.stopPropagation(); cycleStatus('${tid}','${cid}',this.closest('.t-card'))"
              title="Click to cycle: Not Started → In Progress → Done → Review">
          ${STATUS_SHORT[status]}
        </span>

        <span class="t-card-title">${concept.title}</span>

        <div class="t-conf-wrap" title="Set your confidence level (1=Shaky, 5=Expert)">${dotHtml}</div>

        <span class="t-card-chevron" aria-hidden="true">▼</span>
      </div>

      <div class="t-card-body">
        <div class="t-card-subtitle">${concept.subtitle}</div>
        <div class="t-note-label">My Notes</div>
        <textarea class="t-note-area"
                  placeholder="Add your notes, gotchas, or key points here…"
                  oninput="scheduleNoteSave('${tid}','${cid}',this.value)"
                  >${escapeHtml(notes)}</textarea>
        <div class="t-card-footer-row">
          <span class="t-last-studied">${lastStudied}</span>
          ${url
            ? `<a class="t-study-link" href="${url}" target="_blank">📖 Open Study File</a>`
            : `<span style="font-family:var(--font-mono);font-size:10px;color:var(--text-3)">Study file not yet added</span>`
          }
        </div>
      </div>
    </div>
  `;
}

function escapeHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── Card Interactions ───────────────────────────────────── */

function toggleCard(headerEl) {
  const body    = headerEl.nextElementSibling;
  const chevron = headerEl.querySelector('.t-card-chevron');
  const isOpen  = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  if (chevron) chevron.classList.toggle('open', !isOpen);
}

function cycleStatus(tid, cid, cardEl) {
  const topicId = decodeURIComponent(tid);
  const title   = decodeURIComponent(cid);
  const cs      = getC(topicId, title);
  const idx     = STATUS_CYCLE.indexOf(cs.status);
  const next    = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
  setC(topicId, title, { status: next });

  // Update card DOM in place (no full re-render needed)
  if (cardEl) {
    cardEl.setAttribute('data-status', next);
    const badge = cardEl.querySelector('.t-status-badge');
    if (badge) {
      badge.className = `t-status-badge ${next}`;
      badge.textContent = STATUS_SHORT[next];
    }
    const lastEl = cardEl.querySelector('.t-last-studied');
    if (lastEl && next !== 'not-started') {
      lastEl.textContent = `Last studied: ${todayStr()}`;
    }
  }

  renderSidebar();
  showToast(`Marked as: ${STATUS_LABELS[next]}`);
}

function setConfidence(tid, cid, level, cardEl) {
  const topicId = decodeURIComponent(tid);
  const title   = decodeURIComponent(cid);
  const cs      = getC(topicId, title);

  // clicking same level clears it (toggle off)
  const newConf = cs.confidence === level ? 0 : level;
  setC(topicId, title, { confidence: newConf });

  // Update dot DOM in place
  if (cardEl) {
    const dots = cardEl.querySelectorAll('.t-conf-dot');
    dots.forEach((dot, i) => {
      const lvl = i + 1;
      dot.classList.toggle('filled', lvl <= newConf);
    });
  }

  renderSidebar();
  if (newConf > 0) showToast(`Confidence: ${CONF_LABELS[newConf]}`);
}

function scheduleNoteSave(tid, cid, value) {
  const key = `${tid}::${cid}`;
  clearTimeout(noteDebouncers[key]);
  noteDebouncers[key] = setTimeout(() => {
    const topicId = decodeURIComponent(tid);
    const title   = decodeURIComponent(cid);
    setC(topicId, title, { notes: value });
    showToast('Notes saved');
  }, 600);
}

function showView(viewId) {
  currentView = viewId;
  renderSidebar();
  if (viewId === 'overview') {
    renderOverview();
  } else {
    renderTopic(viewId);
  }
  document.getElementById('t-main').scrollTop = 0;
}

/* ── Export / Import ─────────────────────────────────────── */

function exportData() {
  const payload = {
    version: 1,
    exportedAt: new Date().toISOString(),
    data: state
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `iph-progress-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Progress exported!');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const payload = JSON.parse(e.target.result);
      const imported = payload.data || payload; // support both formats
      if (typeof imported !== 'object') throw new Error('Invalid format');
      Object.assign(state, imported);
      saveState();
      renderSidebar();
      if (currentView === 'overview') renderOverview();
      else renderTopic(currentView);
      showToast(`Progress imported successfully!`);
    } catch {
      showToast('⚠ Import failed — invalid file', true);
    }
  };
  reader.readAsText(file);
  event.target.value = ''; // reset input
}

function confirmReset() {
  if (confirm('⚠ Reset ALL progress?\n\nThis will clear all status, confidence, and notes for every concept. This cannot be undone.')) {
    state = {};
    saveState();
    renderSidebar();
    if (currentView === 'overview') renderOverview();
    else renderTopic(currentView);
    showToast('All progress reset.');
  }
}

/* ── Toast ───────────────────────────────────────────────── */

let toastTimer;
function showToast(msg, isError = false) {
  const el = document.getElementById('t-toast');
  el.textContent = msg;
  el.style.borderColor = isError ? 'var(--red)' : 'var(--green)';
  el.style.color        = isError ? 'var(--red)' : 'var(--green)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

/* ── Hex → RGB helper ────────────────────────────────────── */
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

/* ── Init ────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  loadState();
  renderSidebar();
  renderOverview();
});
</script>
