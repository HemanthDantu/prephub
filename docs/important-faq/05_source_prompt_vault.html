<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Interview Sheet 05 — Source Prompt Vault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
:root{
  --bg:#0a0e1a;
  --surface:#111827;
  --surface-2:#1a2235;
  --text:#e8eefc;
  --muted:#9fb1d1;
  --cyan:#00d4ff;
  --purple:#7c3aed;
  --green:#10b981;
  --amber:#f59e0b;
  --red:#ef4444;
  --border:rgba(255,255,255,.08);
  --shadow:0 12px 32px rgba(0,0,0,.28);
  --radius:18px;
  --topbar-h:84px;
  --sidebar-w:280px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  font-family:"Syne",system-ui,sans-serif;
  background:
    radial-gradient(circle at top right, rgba(124,58,237,.18), transparent 28%),
    radial-gradient(circle at top left, rgba(0,212,255,.12), transparent 26%),
    var(--bg);
  color:var(--text);
}
a{color:var(--cyan); text-decoration:none}
a:hover{text-decoration:underline}
.topbar{
  position:fixed; inset:0 0 auto 0; height:var(--topbar-h);
  backdrop-filter: blur(14px);
  background:rgba(10,14,26,.84);
  border-bottom:1px solid var(--border);
  z-index:50;
}
.topbar-inner{
  height:100%; display:grid; grid-template-columns:minmax(240px,1fr) auto auto; gap:16px;
  align-items:center; padding:14px 20px;
}
.title-wrap{min-width:0}
.title{font-size:1.15rem; font-weight:800; letter-spacing:.02em; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.subtitle{font-size:.78rem; color:var(--muted); margin-top:4px}
.timer-wrap{display:flex; align-items:center; gap:10px}
.timer{
  font-family:"JetBrains Mono", monospace;
  font-size:1rem; padding:10px 14px; border-radius:999px; background:var(--surface); border:1px solid var(--border);
  box-shadow:var(--shadow);
}
.timer.warn{color:var(--amber); border-color:rgba(245,158,11,.4)}
.timer.danger{color:#fff; background:rgba(239,68,68,.18); border-color:rgba(239,68,68,.45); animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.35)}50%{box-shadow:0 0 0 10px rgba(239,68,68,0)}}
.mode-btn{
  font-family:"JetBrains Mono", monospace; font-size:.86rem;
  background:linear-gradient(135deg, rgba(0,212,255,.16), rgba(124,58,237,.18));
  color:#fff; border:1px solid rgba(0,212,255,.28); border-radius:999px; padding:12px 16px;
  cursor:pointer; transition:transform .18s ease, border-color .18s ease, background .18s ease;
}
.mode-btn:hover{transform:translateY(-1px); border-color:rgba(0,212,255,.55)}
.progress-shell{
  position:absolute; left:0; right:0; bottom:0; height:4px; background:rgba(255,255,255,.05);
}
.progress-bar{
  height:100%; width:0%;
  background:linear-gradient(90deg, var(--cyan), var(--green));
  transition:width 1s linear, background .2s ease;
}
.progress-bar.warn{background:linear-gradient(90deg, var(--amber), #fbbf24)}
.progress-bar.danger{background:linear-gradient(90deg, var(--red), #fb7185)}
.layout{
  display:grid; grid-template-columns:var(--sidebar-w) minmax(0,1fr);
  gap:24px; padding:calc(var(--topbar-h) + 20px) 20px 40px;
}
.sidebar{
  position:sticky; top:calc(var(--topbar-h) + 16px); align-self:start;
  max-height:calc(100vh - var(--topbar-h) - 32px); overflow:auto;
  background:rgba(17,24,39,.76); border:1px solid var(--border);
  border-radius:22px; padding:14px; box-shadow:var(--shadow);
}
.sidebar h2{margin:4px 8px 14px; font-size:.88rem; color:var(--muted); letter-spacing:.06em; text-transform:uppercase}
.nav-list{display:flex; flex-direction:column; gap:8px}
.nav-link{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:12px 12px; border-radius:14px; color:#d7e4ff; background:rgba(255,255,255,.02);
  border:1px solid transparent; transition:background .18s ease, border-color .18s ease, transform .18s ease;
}
.nav-link:hover{background:rgba(255,255,255,.05); border-color:rgba(0,212,255,.18); transform:translateX(2px)}
.badge{
  min-width:36px; text-align:center; font-family:"JetBrains Mono", monospace; font-size:.78rem;
  color:var(--cyan); background:rgba(0,212,255,.08); border:1px solid rgba(0,212,255,.15); padding:4px 8px; border-radius:999px;
}
.main{min-width:0}
.hero{
  background:linear-gradient(180deg, rgba(26,34,53,.95), rgba(17,24,39,.96));
  border:1px solid var(--border); border-radius:24px; padding:22px 24px; box-shadow:var(--shadow); margin-bottom:22px;
}
.hero h1{margin:0 0 8px; font-size:1.55rem}
.hero p{margin:8px 0 0; color:var(--muted); line-height:1.6}
.legend{display:flex; flex-wrap:wrap; gap:10px; margin-top:14px}
.pill{
  font-family:"JetBrains Mono", monospace; font-size:.78rem;
  padding:8px 10px; border-radius:999px; border:1px solid var(--border); background:rgba(255,255,255,.03); color:#d9e6ff;
}
.section{
  margin-bottom:22px; background:rgba(17,24,39,.82); border:1px solid var(--border); border-radius:24px;
  box-shadow:var(--shadow); overflow:hidden;
}
.section-head{
  padding:18px 20px; display:flex; align-items:flex-start; justify-content:space-between; gap:16px;
  background:linear-gradient(135deg, rgba(0,212,255,.08), rgba(124,58,237,.08));
  border-bottom:1px solid var(--border);
}
.section-head h2{margin:0; font-size:1.05rem}
.section-head p{margin:6px 0 0; color:var(--muted); line-height:1.5}
.cards{padding:14px}
.card{
  background:var(--surface-2); border:1px solid rgba(255,255,255,.06); border-radius:18px; overflow:hidden; margin-bottom:12px;
}
.card:last-child{margin-bottom:0}
.q-btn{
  width:100%; text-align:left; background:transparent; color:inherit; border:0; cursor:pointer; padding:0;
}
.q-row{
  display:grid; grid-template-columns:6px 1fr auto; gap:14px; align-items:center;
  padding:16px 18px; min-height:64px;
}
.q-bar{align-self:stretch; border-radius:999px; background:linear-gradient(180deg, var(--cyan), var(--purple))}
.q-text{font-weight:800; line-height:1.45}
.q-meta{font-family:"JetBrains Mono", monospace; font-size:.76rem; color:var(--muted)}
.answer{
  display:grid; grid-template-rows:0fr; transition:grid-template-rows .26s ease, opacity .26s ease;
  opacity:.92;
}
.answer.open{grid-template-rows:1fr; opacity:1}
.answer-inner{overflow:hidden}
.answer-body{
  padding:0 22px 18px 38px; color:#c8d6f3; line-height:1.7;
}
.answer-body p{margin:0 0 10px}
.answer-body ul{margin:0 0 10px 18px; padding:0}
.answer-body li{margin:4px 0}
.recall-hint{
  display:none; margin-top:6px; font-size:.78rem; color:rgba(232,238,252,.42); font-family:"JetBrains Mono", monospace;
}
.recall .card:not(.open) .recall-hint{display:block}
.recall .answer:not(.open){opacity:.55}
pre{
  margin:12px 0 0; background:#050810; border:1px solid rgba(255,255,255,.08);
  border-radius:16px; padding:14px 16px; overflow:auto;
}
code{font-family:"JetBrains Mono", monospace; font-size:.86rem; color:#dbeafe}
.kw{color:#c084fc}
.type{color:#67e8f9}
.fn{color:#fbbf24}
.str{color:#86efac}
.cm{color:#6b7280}
.footer-note{
  color:var(--muted); font-size:.82rem; margin-top:22px; padding:0 6px;
}
.index-grid{
  display:grid; grid-template-columns:repeat(auto-fit, minmax(260px, 1fr)); gap:16px; margin-top:14px;
}
.index-card{
  display:block; padding:18px; border-radius:20px; background:linear-gradient(180deg, rgba(17,24,39,.98), rgba(26,34,53,.98));
  border:1px solid var(--border); box-shadow:var(--shadow); color:#fff;
}
.index-card h3{margin:0 0 8px}
.index-card p{margin:0 0 10px; color:var(--muted); line-height:1.55}
.index-card .badge{display:inline-block}
@media (max-width: 980px){
  :root{--sidebar-w:100%}
  .layout{grid-template-columns:1fr}
  .sidebar{
    position:sticky; top:calc(var(--topbar-h) + 10px); z-index:20;
    display:block; white-space:nowrap; overflow:auto hidden;
  }
  .nav-list{display:flex; flex-direction:row; min-width:max-content}
  .nav-link{min-width:220px}
}
@media (max-width: 720px){
  :root{--topbar-h:112px}
  .topbar-inner{grid-template-columns:1fr 1fr; align-items:start}
  .timer-wrap{justify-self:start}
  .mode-btn{justify-self:end}
  .title{font-size:1rem}
  .hero h1{font-size:1.25rem}
  .q-row{grid-template-columns:6px 1fr; }
  .q-meta{display:none}
}
</style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="title-wrap">
        <div class="title" id="pageTitle"></div>
        <div class="subtitle" id="pageSubtitle"></div>
      </div>
      <div class="timer-wrap">
        <div class="timer" id="timer">30:00</div>
      </div>
      <button id="modeBtn" class="mode-btn">SCAN MODE</button>
    </div>
    <div class="progress-shell"><div id="progressBar" class="progress-bar"></div></div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <h2>Topic groups</h2>
      <nav class="nav-list" id="nav"></nav>
    </aside>

    <main class="main">
      <section class="hero">
        <h1 id="heroTitle"></h1>
        <p id="heroCopy"></p>
        <div class="legend" id="legend"></div>
      </section>

      <div id="sections"></div>

      <p class="footer-note">Built as a daily-review interview sheet. In scan mode everything stays open. In recall mode every prompt becomes a self-test card.</p>
    </main>
  </div>

  <script>
  const PAGE_DATA = {"pageTitle": "Interview Sheet 05 — Source Prompt Vault", "pageSubtitle": "Completeness file • preserves the source prompts so nothing gets lost", "heroTitle": "Full source prompt vault", "heroCopy": "This vault keeps the original prompt coverage from the uploaded documents in one place. Each prompt points you to the best focused sheet/section so you can study cleanly without losing any source material.", "legend": ["Coverage file", "Cross-linked prompts", "Use with the focused sheets"], "sections": [{"id": "179092-set-1-senior-full-stack-engineer", "title": "179092 Set 1 – Senior Full Stack Engineer", "cards": [{"q": "Explain how you’d design a stateless microservice to fetch and update data in Salesforce. How would you handle retries and backoff?", "a": "<p><strong>Best place to study this:</strong> <a href=\"03_data_kafka_cloud_sheet.html#sql-analytics\">SQL/analytics</a>.</p>"}, {"q": "How do you use Java Streams for bulk data transformations while keeping memory usage low?", "a": "<p><strong>Best place to study this:</strong> <a href=\"01_java_core_sheet.html#java-streams\">Java 8/streams</a>.</p>"}, {"q": "Implement a multithreaded batch processor that reads 1M records and publishes to Kafka topics. How would you manage concurrency?", "a": "<p><strong>Best place to study this:</strong> <a href=\"03_data_kafka_cloud_sheet.html#kafka-core\">Kafka fundamentals</a>.</p>"}, {"q": "Design a rate-limiter microservice in Java that protects downstream APIs.", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-rest\">REST design</a>.</p>"}, {"q": "How would you secure a REST API in a microservices ecosystem with token-based authentication?", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-security\">Spring Security</a>.</p>"}, {"q": "What’s your approach to making HTTP clients resilient (timeout configuration, retries, and circuit breakers)?", "a": "<p><strong>Best place to study this:</strong> <a href=\"05_source_prompt_vault.html#unmapped\">Source vault only</a>.</p>"}, {"q": "Given an existing legacy SOAP service, how would you wrap it into a modern RESTful endpoint using Spring Boot?", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-rest\">REST design</a>.</p>"}, {"q": "How do you implement graceful shutdown and resource cleanup in a Spring Boot service on EKS?", "a": "<p><strong>Best place to study this:</strong> <a href=\"03_data_kafka_cloud_sheet.html#kubernetes\">Containers/Kubernetes</a>.</p>"}, {"q": "Write code to paginate a large dataset using Java streams and RESTful API responses.", "a": "<p><strong>Best place to study this:</strong> <a href=\"01_java_core_sheet.html#java-streams\">Java 8/streams</a>.</p>"}, {"q": "Describe how you would manage distributed transactions across microservices.", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-resilience\">Resilience patterns</a>.</p>"}, {"q": "What patterns would you use to prevent tight coupling between your microservices?", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-design\">Microservice/system design</a>.</p>"}, {"q": "How would you design a REST API to handle partial updates (PATCH semantics)?", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-rest\">REST design</a>.</p>"}, {"q": "Implement an in-memory cache using Java and discuss eviction strategies.", "a": "<p><strong>Best place to study this:</strong> <a href=\"01_java_core_sheet.html#java-jvm\">JVM/memory</a>.</p>"}, {"q": "Describe how object mapping libraries like MapStruct differ from manual converters.", "a": "<p><strong>Best place to study this:</strong> <a href=\"05_source_prompt_vault.html#unmapped\">Source vault only</a>.</p>"}, {"q": "How would you implement input validation using the Bean Validation (JSR 380) API?", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-validation\">Validation/observability</a>.</p>"}, {"q": "What’s your approach to detecting and handling memory leaks in Java-based services?", "a": "<p><strong>Best place to study this:</strong> <a href=\"01_java_core_sheet.html#java-jvm\">JVM/memory</a>.</p>"}, {"q": "Explain the use of Builder and Factory patterns in creating DTOs for large APIs.", "a": "<p><strong>Best place to study this:</strong> <a href=\"01_java_core_sheet.html#java-oop\">OOP/patterns</a>.</p>"}, {"q": "How do you load large reference datasets efficiently at application startup?", "a": "<p><strong>Best place to study this:</strong> <a href=\"05_source_prompt_vault.html#unmapped\">Source vault only</a>.</p>"}, {"q": "How would you monitor thread pool saturation in a high-load environment?", "a": "<p><strong>Best place to study this:</strong> <a href=\"01_java_core_sheet.html#java-concurrency\">Concurrency</a>.</p>"}, {"q": "Explain how you’d implement distributed logging correlation using correlation IDs.", "a": "<p><strong>Best place to study this:</strong> <a href=\"05_source_prompt_vault.html#unmapped\">Source vault only</a>.</p>"}, {"q": "Describe a scenario where asynchronous REST endpoints (DeferredResult/WebFlux) are needed.", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-rest\">REST design</a>.</p>"}, {"q": "How do you prevent serialization issues when using Jackson with polymorphic DTOs?", "a": "<p><strong>Best place to study this:</strong> <a href=\"05_source_prompt_vault.html#unmapped\">Source vault only</a>.</p>"}, {"q": "Describe how Spring Batch ensures fault tolerance during job execution.", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-batch\">Spring Batch</a>.</p>"}, {"q": "How would you configure multiple Spring Batch jobs sharing the same repository?", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-batch\">Spring Batch</a>.</p>"}, {"q": "Explain how @EnableBatchProcessing works in Spring Boot.", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-batch\">Spring Batch</a>.</p>"}, {"q": "How do you restart a failed Spring Batch job from the last committed chunk?", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-batch\">Spring Batch</a>.</p>"}, {"q": "Design a Spring Batch job to move data from Oracle to Snowflake in parallel steps.", "a": "<p><strong>Best place to study this:</strong> <a href=\"03_data_kafka_cloud_sheet.html#sql-analytics\">SQL/analytics</a>.</p>"}, {"q": "What’s the role of JobRepository and JobLauncher in Spring Batch?", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-batch\">Spring Batch</a>.</p>"}, {"q": "Explain the internals of Spring Security filters chain and how you would customize it.", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-security\">Spring Security</a>.</p>"}, {"q": "How would you integrate JWT-based authentication with Spring Security?", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-security\">Spring Security</a>.</p>"}, {"q": "How do you configure conditional beans and profiles in Spring Boot for different environments?", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-architecture\">Spring architecture</a>.</p>"}, {"q": "What is the difference between @Transactional on class and method scope?", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-security\">Spring Security</a>.</p>"}, {"q": "Explain job parameters in Spring Batch and their immutability impact.", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-batch\">Spring Batch</a>.</p>"}, {"q": "How would you secure a REST endpoint based on user roles using annotations?", "a": "<p><strong>Best place to study this:</strong> <a href=\"05_source_prompt_vault.html#unmapped\">Source vault only</a>.</p>"}, {"q": "Describe how Spring Boot autoconfiguration works under the hood.", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-architecture\">Spring architecture</a>.</p>"}, {"q": "Implement a custom ItemProcessor in Spring Batch that filters invalid records.", "a": "<p><strong>Best place to study this:</strong> <a href=\"03_data_kafka_cloud_sheet.html#aws-core\">AWS core</a>.</p>"}, {"q": "How would you tune chunk size and commit interval for batch jobs with large datasets?", "a": "<p><strong>Best place to study this:</strong> <a href=\"05_source_prompt_vault.html#unmapped\">Source vault only</a>.</p>"}, {"q": "Explain how you’d externalize application configuration secrets securely.", "a": "<p><strong>Best place to study this:</strong> <a href=\"05_source_prompt_vault.html#unmapped\">Source vault only</a>.</p>"}, {"q": "How do you use Spring Actuator to monitor health and metrics of your app?", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-validation\">Validation/observability</a>.</p>"}, {"q": "Discuss graceful error recovery strategies in Spring Batch.", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-batch\">Spring Batch</a>.</p>"}, {"q": "How would you audit user activity across endpoints using Spring Security hooks?", "a": "<p><strong>Best place to study this:</strong> <a href=\"02_spring_microservices_sheet.html#spring-security\">Spring Security</a>.</p>"}, {"q": "Expl const TOTAL_SECONDS = 30 * 60;
let secondsLeft = TOTAL_SECONDS;
let recallMode = false;

function formatTime(sec){
  const m = String(Math.floor(sec / 60)).padStart(2,'0');
  const s = String(sec % 60).padStart(2,'0');
  return `${m}:${s}`;
}

function buildNav(sections){
  const nav = document.getElementById('nav');
  nav.innerHTML = '';
  sections.forEach(section => {
    const a = document.createElement('a');
    a.href = `#${section.id}`;
    a.className = 'nav-link';
    a.innerHTML = `<span>${section.title}</span><span class="badge">${section.cards.length}</span>`;
    nav.appendChild(a);
  });
}

function createCard(card){
  const article = document.createElement('article');
  article.className = 'card open';

  const btn = document.createElement('button');
  btn.className = 'q-btn';
  btn.type = 'button';

  const qrow = document.createElement('div');
  qrow.className = 'q-row';
  qrow.innerHTML = `
    <div class="q-bar"></div>
    <div>
      <div class="q-text">${card.q}</div>
      <div class="recall-hint">click to reveal</div>
    </div>
    <div class="q-meta">${card.meta || ''}</div>
  `;
  btn.appendChild(qrow);

  const answer = document.createElement('div');
  answer.className = 'answer open';
  answer.innerHTML = `<div class="answer-inner"><div class="answer-body">${card.a}</div></div>`;

  btn.addEventListener('click', () => {
    if(!recallMode) return;
    article.classList.toggle('open');
    answer.classList.toggle('open');
  });

  article.appendChild(btn);
  article.appendChild(answer);
  return article;
}

function renderSections(payload){
  buildNav(payload.sections);
  const root = document.getElementById('sections');
  root.innerHTML = '';
  payload.sections.forEach(section => {
    const sec = document.createElement('section');
    sec.className = 'section';
    sec.id = section.id;
    sec.innerHTML = `
      <div class="section-head">
        <div>
          <h2>${section.title}</h2>
          <p>${section.blurb || ''}</p>
        </div>
        <span class="badge">${section.cards.length} prompts</span>
      </div>
      <div class="cards"></div>
    `;
    const cardsEl = sec.querySelector('.cards');
    section.cards.forEach(card => cardsEl.appendChild(createCard(card)));
    root.appendChild(sec);
  });
}

function setMode(nextRecall){
  recallMode = nextRecall;
  document.body.classList.toggle('recall', recallMode);
  const btn = document.getElementById('modeBtn');
  btn.textContent = recallMode ? 'RECALL MODE' : 'SCAN MODE';
  document.querySelectorAll('.card').forEach(card => {
    const answer = card.querySelector('.answer');
    if(recallMode){
      card.classList.remove('open');
      answer.classList.remove('open');
    } else {
      card.classList.add('open');
      answer.classList.add('open');
    }
  });
}

function initTimer(){
  const timer = document.getElementById('timer');
  const bar = document.getElementById('progressBar');
  timer.textContent = formatTime(secondsLeft);
  const tick = () => {
    timer.textContent = formatTime(secondsLeft);
    const elapsed = TOTAL_SECONDS - secondsLeft;
    bar.style.width = `${(elapsed / TOTAL_SECONDS) * 100}%`;
    timer.classList.remove('warn','danger');
    bar.classList.remove('warn','danger');

    if(secondsLeft <= 60){
      timer.classList.add('danger');
      bar.classList.add('danger');
    } else if(secondsLeft <= 300){
      timer.classList.add('warn');
      bar.classList.add('warn');
    }
    if(secondsLeft > 0) secondsLeft -= 1;
  };
  tick();
  setInterval(tick, 1000);
}

function hydratePage(payload){
  document.getElementById('pageTitle').textContent = payload.pageTitle;
  document.getElementById('pageSubtitle').textContent = payload.pageSubtitle;
  document.getElementById('heroTitle').textContent = payload.heroTitle;
  document.getElementById('heroCopy').innerHTML = payload.heroCopy;
  document.getElementById('legend').innerHTML = (payload.legend || []).map(x => `<span class="pill">${x}</span>`).join('');
  renderSections(payload);
  document.getElementById('modeBtn').addEventListener('click', () => setMode(!recallMode));
  setMode(false);
  initTimer();
}

  hydratePage(PAGE_DATA);
  </script>
</body>
</html>
