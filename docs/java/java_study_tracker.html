<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17-Day Java Senior Interview Prep</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;500;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --surface3: #22222f;
    --accent: #6c63ff;
    --accent2: #ff6584;
    --green: #00e5a0;
    --amber: #ffb347;
    --red: #ff4757;
    --text: #e8e8f0;
    --text2: #9090aa;
    --text3: #55556a;
    --border: #2a2a3a;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 13px; font-family: var(--mono); color: var(--accent); letter-spacing: 0.08em; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); }
  .header-meta { font-size: 12px; color: var(--text2); font-family: var(--mono); }
  .overall-progress { display: flex; align-items: center; gap: 12px; }
  .overall-pct { font-size: 24px; font-weight: 800; color: var(--green); font-family: var(--mono); }
  .overall-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; }

  /* LAYOUT */
  .layout { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 69px); }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    overflow-y: auto;
    max-height: calc(100vh - 69px);
    position: sticky;
    top: 69px;
  }
  .sidebar-section { margin-bottom: 8px; }
  .sidebar-label {
    font-size: 10px; font-family: var(--mono); color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.12em;
    padding: 0 20px 8px;
  }
  .day-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 10px 20px;
    background: none; border: none; cursor: pointer;
    text-align: left; transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .day-btn:hover { background: var(--surface2); }
  .day-btn.active { background: var(--surface2); border-left-color: var(--accent); }
  .day-btn.completed { border-left-color: var(--green); }
  .day-num {
    font-size: 11px; font-family: var(--mono); color: var(--text3);
    min-width: 28px;
  }
  .day-btn.active .day-num, .day-btn.completed .day-num { color: var(--accent); }
  .day-btn.completed .day-num { color: var(--green); }
  .day-info { flex: 1; }
  .day-topic { font-size: 12px; font-weight: 700; color: var(--text2); line-height: 1.3; }
  .day-btn.active .day-topic { color: var(--text); }
  .day-progress-mini {
    width: 36px; height: 4px; background: var(--surface3);
    border-radius: 2px; overflow: hidden;
  }
  .day-progress-mini-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
  .day-btn.completed .day-progress-mini-fill { background: var(--green); }

  /* MAIN */
  .main { padding: 28px 32px; overflow-y: auto; }

  /* DAY HEADER */
  .day-header {
    display: flex; align-items: flex-start;
    justify-content: space-between; margin-bottom: 24px;
    padding-bottom: 20px; border-bottom: 1px solid var(--border);
  }
  .day-badge {
    font-size: 10px; font-family: var(--mono); color: var(--accent);
    background: rgba(108,99,255,0.12); padding: 4px 10px;
    border-radius: 4px; letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 8px; display: inline-block;
  }
  .day-title { font-size: 22px; font-weight: 800; color: var(--text); line-height: 1.2; margin-bottom: 4px; }
  .day-subtitle { font-size: 13px; color: var(--text2); }
  .day-stats { display: flex; gap: 16px; align-items: center; }
  .stat-box {
    text-align: center; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 16px; min-width: 70px;
  }
  .stat-val { font-size: 20px; font-weight: 800; font-family: var(--mono); color: var(--green); }
  .stat-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

  /* PROGRESS BAR */
  .day-progress-bar {
    height: 6px; background: var(--surface3);
    border-radius: 3px; margin-bottom: 24px; overflow: hidden;
  }
  .day-progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 3px; transition: width 0.4s ease;
  }

  /* HOUR BLOCKS */
  .hours-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 28px; }

  .hour-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .hour-block:hover { border-color: var(--surface3); }
  .hour-block.done { border-color: rgba(0,229,160,0.25); }
  .hour-block.struggling { border-color: rgba(255,71,87,0.3); }

  .hour-header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; cursor: pointer;
    user-select: none;
  }
  .hour-tag {
    font-size: 10px; font-family: var(--mono);
    padding: 3px 8px; border-radius: 4px;
    font-weight: 700; white-space: nowrap;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .tag-revision { background: rgba(255,179,71,0.15); color: var(--amber); }
  .tag-theory { background: rgba(108,99,255,0.15); color: var(--accent); }
  .tag-lab { background: rgba(0,229,160,0.12); color: var(--green); }
  .tag-interview { background: rgba(255,101,132,0.15); color: var(--accent2); }

  .hour-time { font-size: 11px; font-family: var(--mono); color: var(--text3); min-width: 50px; }
  .hour-title { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; }
  .hour-actions { display: flex; gap: 8px; align-items: center; }

  .status-btn {
    font-size: 10px; font-family: var(--mono); padding: 4px 10px;
    border-radius: 4px; border: 1px solid var(--border);
    cursor: pointer; background: var(--surface2);
    color: var(--text2); transition: all 0.15s; white-space: nowrap;
  }
  .status-btn:hover { border-color: var(--text3); color: var(--text); }
  .status-btn.active-done { background: rgba(0,229,160,0.15); border-color: var(--green); color: var(--green); }
  .status-btn.active-struggle { background: rgba(255,71,87,0.15); border-color: var(--red); color: var(--red); }
  .status-btn.active-skip { background: rgba(255,179,71,0.1); border-color: var(--amber); color: var(--amber); }

  .hour-body { padding: 0 16px 14px; display: none; }
  .hour-body.open { display: block; }

  .hour-section { margin-top: 12px; }
  .hour-section-label {
    font-size: 10px; font-family: var(--mono); color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
  }
  .task-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .task-item {
    display: flex; align-items: flex-start; gap: 8px;
    font-size: 12px; color: var(--text2); line-height: 1.5;
    padding: 2px 0;
  }
  .task-item::before {
    content: '→'; color: var(--text3); font-family: var(--mono);
    font-size: 11px; margin-top: 1px; flex-shrink: 0;
  }
  .task-item code {
    font-family: var(--mono); font-size: 11px;
    background: var(--surface3); padding: 1px 5px;
    border-radius: 3px; color: var(--accent);
  }

  .note-area {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px; font-family: var(--mono); font-size: 12px;
    color: var(--text); resize: vertical; min-height: 70px;
    margin-top: 8px; outline: none; transition: border-color 0.2s;
  }
  .note-area::placeholder { color: var(--text3); }
  .note-area:focus { border-color: var(--accent); }

  /* WEAK SPOTS */
  .weak-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 20px;
    margin-bottom: 24px;
  }
  .weak-panel-title {
    font-size: 11px; font-family: var(--mono); color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 14px;
  }
  .weak-tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .weak-tag {
    font-size: 11px; font-family: var(--mono);
    background: rgba(255,71,87,0.1); color: var(--red);
    border: 1px solid rgba(255,71,87,0.25); border-radius: 4px;
    padding: 4px 10px;
  }
  .weak-empty { font-size: 12px; color: var(--text3); font-family: var(--mono); }

  /* TOMORROW PANEL */
  .tomorrow-panel {
    background: linear-gradient(135deg, rgba(108,99,255,0.08), rgba(0,229,160,0.05));
    border: 1px solid rgba(108,99,255,0.2);
    border-radius: 10px; padding: 20px; margin-bottom: 24px;
  }
  .tomorrow-title {
    font-size: 11px; font-family: var(--mono); color: var(--accent);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px;
  }
  .tomorrow-focus { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .tomorrow-note { font-size: 12px; color: var(--text2); line-height: 1.6; }

  /* DAILY LOG */
  .daily-log {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 20px;
  }
  .daily-log-title {
    font-size: 11px; font-family: var(--mono); color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px;
  }
  .log-field-label { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-bottom: 4px; margin-top: 12px; }

  /* EXPORT/IMPORT */
  .io-btn {
    font-size: 11px; font-family: var(--mono); padding: 6px 12px;
    border-radius: 6px; border: 1px solid var(--border);
    cursor: pointer; background: var(--surface2);
    color: var(--text2); transition: all 0.15s; white-space: nowrap;
    text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  }
  .io-btn:hover { border-color: var(--accent); color: var(--accent); }
  .io-btn.import { border-color: var(--border); }
  .io-btn.import:hover { border-color: var(--green); color: var(--green); }
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2); border: 1px solid var(--green);
    color: var(--green); font-family: var(--mono); font-size: 12px;
    padding: 10px 18px; border-radius: 8px; z-index: 999;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  #import-file { display: none; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; max-height: none; }
    .main { padding: 16px; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <span class="logo">JAVA.PREP</span>
    <div>
      <div class="header-title">14-Day Senior Interview Reconstruction</div>
      <div class="header-meta" id="header-meta">Bank Transaction System · 17-Day Reconstruction</div>
    </div>
  </div>
  <div class="overall-progress">
    <div>
      <div class="overall-pct" id="overall-pct">0%</div>
      <div class="overall-label">Overall</div>
    </div>
    <div class="stat-box" style="min-width:60px">
      <div class="stat-val" id="done-count">0</div>
      <div class="stat-lbl">Done</div>
    </div>
    <div class="stat-box" style="min-width:60px">
      <div class="stat-val" style="color:var(--red)" id="struggle-count">0</div>
      <div class="stat-lbl">Weak</div>
    </div>
    <div style="display:flex;gap:8px;margin-left:8px">
      <button class="io-btn" onclick="exportProgress()">↓ Export</button>
      <label class="io-btn import">↑ Import<input type="file" id="import-file" accept=".json" onchange="importProgress(event)"></label>
    </div>
  </div>
</header>
<div class="toast" id="toast"></div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main-content"></main>
</div>

<script>
const DAYS = [
  {
    day: 1,
    topic: "JVM Internals & Java Memory Model",
    subtitle: "Stack, Heap, GC, ClassLoader — the engine room",
    tomorrow: "Java Fundamentals — Collections, Generics, Exceptions, String internals. Foundation before Streams.",
    hours: [
      { time:"8–9am", type:"theory", tag:"Theory", title:"JVM Architecture — ClassLoaders & Bytecode",
        tasks:["Look up: Bootstrap, Extension, Application ClassLoader hierarchy","Understand: parent-delegation model — why does it exist?","Look up: what does javap -c do? Run it on a simple class","Key class internals: java.lang.ClassLoader, defineClass(), loadClass()","How does Spring hot reload break the parent-delegation model?"] },
      { time:"9–10am", type:"theory", tag:"Theory", title:"Stack vs Heap — What lives where",
        tasks:["Stack: method frames, local primitives, object references (NOT the objects themselves)","Heap: all objects, Young Gen (Eden+Survivor), Old Gen, Metaspace","Look up: what goes in Metaspace? (class metadata, interned Strings post-Java 8)","Why does StackOverflowError happen? Write a recursive method to trigger one deliberately","Why does OutOfMemoryError in Heap differ from Metaspace OOM?"] },
      { time:"10–11am", type:"theory", tag:"Theory", title:"Garbage Collection — How objects die",
        tasks:["Minor GC vs Major GC vs Full GC — when does each trigger?","Mark-and-Sweep, Mark-Compact, Copying — understand each algorithm","Look up: G1GC regions. Why is G1 the default since Java 9?","JVM flags to know: -Xmx, -Xms, -XX:+UseG1GC, -XX:MaxGCPauseMillis","Key concept: Stop-the-world pauses — what causes them, why they matter in production"] },
      { time:"11am–12pm", type:"lab", tag:"Lab 1", title:"Memory Leak Hunt — Diagnose a broken app",
        tasks:["Create a class that causes a memory leak using a static HashMap that never clears","Add a shutdown hook that prints heap usage using Runtime.getRuntime().totalMemory()","Write a method that causes StackOverflowError — catch it and log the depth","Run with -verbose:gc flag and observe GC output in console","Document: what JVM flags would you add to a production Spring Boot app and why?"] },
      { time:"1–2pm", type:"theory", tag:"Theory", title:"Java Memory Model — volatile, happens-before",
        tasks:["What does volatile actually guarantee? (visibility, NOT atomicity)","happens-before relationship — the formal guarantee of JMM","Why can double-checked locking break without volatile?","Look up: memory barriers, CPU cache coherence","Difference between synchronized visibility guarantee vs volatile"] },
      { time:"2–4pm", type:"lab", tag:"Lab 2", title:"Bank Account — Foundation class",
        tasks:["Create BankAccount POJO: id (UUID), owner (String), balance (BigDecimal — never double for money)","Create Transaction record: transactionId, accountId, type (DEPOSIT/WITHDRAW), amount, timestamp","Write equals/hashCode using UUID only — explain why in a comment","Write toString() — explain why you exclude balance from logs (PII)","Create BankAccountRepository interface — just the contract, no implementation yet"] },
      { time:"4–5pm", type:"lab", tag:"Lab 3", title:"ClassLoader experiment",
        tasks:["Write a program that prints the ClassLoader chain for String.class, your own class, and a Spring class","Observe: String uses Bootstrap (prints null), yours uses AppClassLoader","Look up: how does Tomcat use custom ClassLoaders for webapp isolation?","Write in your notes: explain ClassLoader parent delegation in plain English (Feynman prep)"] },
      { time:"5–6pm", type:"interview", tag:"Interview", title:"Senior Edge-Case Questions — JVM",
        tasks:["Q: A production app is getting frequent Full GCs every 2 minutes. Walk me through your diagnosis.","Q: What is the difference between Metaspace and PermGen? Why was PermGen removed?","Q: Why should you never use float or double for currency in Java?","Q: What does String.intern() do — when is it useful and when is it dangerous?","Q: Explain a memory leak scenario specific to a long-running Spring Boot application.","Vocab: Stop-the-world, eden space, survivor ratio, GC root, reachable object, safepoint"] }
    ]
  },
  {
    day: 2,
    topic: "Java Fundamentals — Collections, Generics, Exceptions",
    subtitle: "The foundation Streams and lambdas are built on",
    tomorrow: "Streams & Lambdas — now you have the Collections and type system knowledge to understand them properly.",
    hours: [
      { time:"8–9am", type:"revision", tag:"Revision A", title:"Day 1 Recall — JVM from memory",
        tasks:["Without notes: draw JVM memory regions — Stack, Heap (Eden/Survivor/Old), Metaspace","Explain ClassLoader parent-delegation in 60 seconds out loud","What is the difference between Minor GC and Full GC? When does each trigger?","Why is BigDecimal used for money? What goes wrong with double?"] },
      { time:"9–10am", type:"theory", tag:"Theory", title:"Collections — internals that matter for interviews",
        tasks:["ArrayList: backed by Object[], resizes at 1.5x — amortized O(1) add","LinkedList: doubly-linked nodes — O(1) add/remove at ends, O(n) get(index) — rarely the right choice","HashMap: array of buckets, hash(key) % capacity — look up: what happens on collision? (chaining vs open addressing)","HashMap resize: load factor 0.75, doubles capacity, rehashes ALL entries — why this matters for memory spikes","HashSet is just a HashMap with dummy values — know this","LinkedHashMap: insertion-order — useful for LRU cache implementation","TreeMap: Red-Black tree, O(log n) — keys always sorted","Fail-fast iterators: ConcurrentModificationException — what causes it?"] },
      { time:"10–11am", type:"theory", tag:"Theory", title:"Generics — wildcards, bounds, type erasure",
        tasks:["Generic class: class Box<T> — T is erased at compile time (type erasure)","Bounded wildcards: <? extends T> (covariant, read-only), <? super T> (contravariant, write)","PECS rule: Producer Extends, Consumer Super — know when to use each","Look up: what is type erasure? Why can't you do new T() inside a generic class?","Difference between List<Object> and List<?> — common interview trap","Generic methods vs generic classes — when do you need a generic method?"] },
      { time:"11am–12pm", type:"theory", tag:"Theory", title:"Exception handling — checked vs unchecked internals",
        tasks:["Throwable → Error (JVM failures) vs Exception (application failures)","Checked exceptions: must declare or catch — compiler enforced — extends Exception","Unchecked: RuntimeException subclasses — no compile-time enforcement","try-with-resources: AutoCloseable.close() called automatically — look up: what if both try and close() throw?","Multi-catch: catch (IOException | SQLException e) — e is effectively final","Exception chaining: new RuntimeException('msg', cause) — always wrap with cause in production","Common mistake: swallowing exceptions with empty catch block — what to do instead"] },
      { time:"1–3pm", type:"lab", tag:"Lab", title:"Collections deep dive in Bank project",
        tasks:["Add Map<UUID, BankAccount> as an in-memory store — explain why HashMap not TreeMap here","Write getTopNAccounts(int n) — returns accounts sorted by balance using TreeMap or Comparator","Write findDuplicateOwners() — uses groupingBy + filter on stream to find owners with 2+ accounts (preview of Day 3)","Deliberately trigger ConcurrentModificationException — then fix with Iterator.remove()","Implement a simple LRU cache for account lookups using LinkedHashMap — override removeEldestEntry()"] },
      { time:"3–4pm", type:"theory", tag:"Theory", title:"String internals — pool, immutability, StringBuilder",
        tasks:["String is immutable — every concat creates a new object — why this matters in loops","String pool: string literals are interned by default — == vs equals() trap","Look up: String.intern() — forces heap string into pool — when is this actually useful?","StringBuilder vs StringBuffer — Buffer is synchronized, Builder is not — which to use and why?","String.format() vs StringBuilder for concatenation — performance implications in hot paths"] },
      { time:"4–5pm", type:"lab", tag:"Lab", title:"Exception handling in Bank project",
        tasks:["Create custom checked exception: InsufficientFundsException extends Exception","Create custom unchecked: InvalidTransactionException extends RuntimeException","Add try-with-resources to any file/connection handling in your project","Write a method that wraps a checked exception in an unchecked one — explain why this pattern exists","Make sure every catch block either logs+rethrows or handles — no swallowed exceptions"] },
      { time:"5–6pm", type:"interview", tag:"Interview", title:"Senior Edge-Case Questions — Collections & Exceptions",
        tasks:["Q: Why does HashMap allow one null key but Hashtable does not?","Q: What is the difference between fail-fast and fail-safe iterators? Give an example of each.","Q: When would you use LinkedHashMap over HashMap?","Q: What happens if hashCode() always returns the same value?","Q: Why do checked exceptions exist? Make the case for and against them.","Vocab: load factor, rehashing, type erasure, PECS, ConcurrentModificationException, autoboxing trap"] }
    ]
  },
  {
    day: 3,
    topic: "Java 8+ — Streams, Lambdas, Optional",
    subtitle: "Functional programming the right way — built on Day 2 foundations",
    tomorrow: "OOP Design — polymorphism depth, SOLID principles, design patterns.",
    hours: [
      { time:"8–9am", type:"revision", tag:"Revision A", title:"Day 2 Recall — Collections from memory",
        tasks:["What is HashMap's internal structure? What happens on hash collision?","What does the load factor 0.75 mean? When does HashMap resize?","Explain the PECS rule with a concrete example","What is the difference between a checked and unchecked exception? Which does Spring prefer?"] },
      { time:"9–9:30am", type:"revision", tag:"Revision B", title:"Day 1 Feynman — JVM to a non-developer",
        tasks:["Explain stack vs heap as if talking to a non-technical manager — use an analogy","Explain GC: what is a reachable object? Use a real-world metaphor","Explain why double fails for currency — make it vivid with a concrete $0.10 + $0.20 example"] },
      { time:"9:30–11am", type:"theory", tag:"Theory", title:"Lambda internals — what actually happens",
        tasks:["Lambdas are NOT anonymous inner classes — look up: invokedynamic bytecode instruction","A lambda captures effectively final variables — WHY? (relates to Day 1 stack/heap — variable must be safe to copy)","Functional interfaces: Function<T,R>, Predicate<T>, Consumer<T>, Supplier<T>, BiFunction<T,U,R>","Look up: what is a SAM interface? Why does @FunctionalInterface matter?","Method references — 4 types: static (Class::method), instance (obj::method), arbitrary instance (Class::method), constructor (Class::new)"] },
      { time:"11am–12pm", type:"theory", tag:"Theory", title:"Stream API — pipeline internals",
        tasks:["Streams are lazy — intermediate ops don't execute until terminal op is called","Intermediate: filter, map, flatMap, distinct, sorted, peek, limit, skip","Terminal: collect, forEach, reduce, count, findFirst, anyMatch, allMatch","Look up: what is a Spliterator? How does parallel stream use ForkJoinPool?","Critical: why is forEach on a parallel stream dangerous with mutable state?","Collectors: toList(), toMap(), groupingBy(), partitioningBy(), joining()"] },

let state = {};
try { state = JSON.parse(localStorage.getItem('java_prep_state') || '{}'); } catch(e) {}

function save() {
  try { localStorage.setItem('java_prep_state', JSON.stringify(state)); } catch(e) {}
  updateOverall();
}

function getHourKey(day, hourIdx) { return `d${day}_h${hourIdx}`; }
function getNoteKey(day, hourIdx) { return `note_d${day}_h${hourIdx}`; }
function getDayNoteKey(day, field) { return `daynote_d${day}_${field}`; }

function getHourStatus(day, hourIdx) { return state[getHourKey(day, hourIdx)] || 'none'; }
function setHourStatus(day, hourIdx, status) {
  state[getHourKey(day, hourIdx)] = status;
  save();
  renderDay(day);
  renderSidebar();
}

function getNote(day, hourIdx) { return state[getNoteKey(day, hourIdx)] || ''; }
function setNote(day, hourIdx, val) { state[getNoteKey(day, hourIdx)] = val; save(); }

function getDayNote(day, field) { return state[getDayNoteKey(day, field)] || ''; }
function setDayNote(day, field, val) { state[getDayNoteKey(day, field)] = val; save(); }

function getDayProgress(dayIdx) {
  const d = DAYS[dayIdx];
  const total = d.hours.length;
  const done = d.hours.filter((_, i) => getHourStatus(d.day, i) === 'done').length;
  return { done, total, pct: total > 0 ? Math.round((done/total)*100) : 0 };
}

function getWeakSpots() {
  const spots = [];
  DAYS.forEach(d => {
    d.hours.forEach((h, i) => {
      if (getHourStatus(d.day, i) === 'struggle') {
        spots.push({ day: d.day, topic: d.topic, hour: h.title });
      }
    });
  });
  return spots;
}

function updateOverall() {
  let totalDone = 0, totalHours = 0, totalStruggle = 0;
  DAYS.forEach(d => {
    d.hours.forEach((_, i) => {
      totalHours++;
      const s = getHourStatus(d.day, i);
      if (s === 'done') totalDone++;
      if (s === 'struggle') totalStruggle++;
    });
  });
  const pct = Math.round((totalDone / totalHours) * 100);
  document.getElementById('overall-pct').textContent = pct + '%';
  document.getElementById('done-count').textContent = totalDone;
  document.getElementById('struggle-count').textContent = totalStruggle;
}

let currentDay = 1;

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="sidebar-section"><div class="sidebar-label">14-Day Plan</div>' +
    DAYS.map(d => {
      const prog = getDayProgress(d.day - 1);
      const isActive = d.day === currentDay;
      const isDone = prog.pct === 100;
      return `<button class="day-btn ${isActive ? 'active' : ''} ${isDone ? 'completed' : ''}" onclick="switchDay(${d.day})">
        <span class="day-num">D${String(d.day).padStart(2,'0')}</span>
        <div class="day-info">
          <div class="day-topic">${d.topic.split('—')[0].trim()}</div>
          <div class="day-progress-mini"><div class="day-progress-mini-fill" style="width:${prog.pct}%"></div></div>
        </div>
      </button>`;
    }).join('') + '</div>';
}

function switchDay(dayNum) {
  currentDay = dayNum;
  renderSidebar();
  renderDay(dayNum);
  document.getElementById('main-content').scrollTop = 0;
}

function renderDay(dayNum) {
  const d = DAYS[dayNum - 1];
  const prog = getDayProgress(dayNum - 1);
  const weakSpots = getWeakSpots();

  const typeMap = { revision: 'tag-revision', theory: 'tag-theory', lab: 'tag-lab', interview: 'tag-interview' };

  const hoursHtml = d.hours.map((h, i) => {
    const status = getHourStatus(dayNum, i);
    const note = getNote(dayNum, i);
    const blockClass = status === 'done' ? 'done' : status === 'struggle' ? 'struggling' : '';
    const openClass = ''; // collapsed by default

    return `<div class="hour-block ${blockClass}" id="hblock-${i}">
      <div class="hour-header" onclick="toggleHour(${i})">
        <span class="hour-time">${h.time}</span>
        <span class="hour-tag ${typeMap[h.type] || 'tag-theory'}">${h.tag}</span>
        <span class="hour-title">${h.title}</span>
        <div class="hour-actions" onclick="event.stopPropagation()">
          <button class="status-btn ${status==='done'?'active-done':''}" onclick="setHourStatus(${dayNum},${i},'${status==='done'?'none':'done'}')">Done</button>
          <button class="status-btn ${status==='struggle'?'active-struggle':''}" onclick="setHourStatus(${dayNum},${i},'${status==='struggle'?'none':'struggle'}')">Weak</button>
          <button class="status-btn ${status==='skip'?'active-skip':''}" onclick="setHourStatus(${dayNum},${i},'${status==='skip'?'none':'skip'}')">Skip</button>
        </div>
      </div>
      <div class="hour-body" id="hbody-${i}">
        <div class="hour-section">
          <div class="hour-section-label">Tasks</div>
          <ul class="task-list">${h.tasks.map(t => `<li class="task-item">${t.replace(/`([^`]+)`/g, '<code>$1</code>')}</li>`).join('')}</ul>
        </div>
        <div class="hour-section">
          <div class="hour-section-label">My notes / struggles</div>
          <textarea class="note-area" placeholder="What did I actually do? What confused me? What should I revisit?" oninput="setNote(${dayNum},${i},this.value)">${note}</textarea>
        </div>
      </div>
    </div>`;
  }).join('');

  const weakHtml = weakSpots.length === 0
    ? '<div class="weak-empty">No weak spots flagged yet — mark hours as Weak above</div>'
    : `<div class="weak-tags">${weakSpots.map(w => `<span class="weak-tag">D${w.day}: ${w.hour}</span>`).join('')}</div>`;

  const mc = document.getElementById('main-content');
  mc.innerHTML = `
    <div class="day-header">
      <div>
        <div class="day-badge">Day ${d.day} of 14</div>
        <div class="day-title">${d.topic}</div>
        <div class="day-subtitle">${d.subtitle}</div>
      </div>
      <div class="day-stats">
        <div class="stat-box"><div class="stat-val">${prog.done}</div><div class="stat-lbl">Done</div></div>
        <div class="stat-box"><div class="stat-val">${d.hours.length}</div><div class="stat-lbl">Total</div></div>
        <div class="stat-box"><div class="stat-val">${prog.pct}%</div><div class="stat-lbl">Progress</div></div>
      </div>
    </div>

    <div class="day-progress-bar"><div class="day-progress-bar-fill" style="width:${prog.pct}%"></div></div>

    <div class="hours-grid">${hoursHtml}</div>

    <div class="weak-panel">
      <div class="weak-panel-title">Weak spots across all days</div>
      ${weakHtml}
    </div>

    <div class="tomorrow-panel">
      <div class="tomorrow-title">Tomorrow's focus</div>
      <div class="tomorrow-note">${d.tomorrow}</div>
    </div>

    <div class="daily-log">
      <div class="daily-log-title">End-of-day log</div>
      <div class="log-field-label">What did I actually finish today?</div>
      <textarea class="note-area" placeholder="Honest summary..." oninput="setDayNote(${dayNum},'finished',this.value)">${getDayNote(dayNum,'finished')}</textarea>
      <div class="log-field-label">What am I still weak on?</div>
      <textarea class="note-area" placeholder="Topics that need more time..." oninput="setDayNote(${dayNum},'weak',this.value)">${getDayNote(dayNum,'weak')}</textarea>
      <div class="log-field-label">What should I fix tomorrow (Hour 1 & 2)?</div>
      <textarea class="note-area" placeholder="Specific things to recall/explain tomorrow..." oninput="setDayNote(${dayNum},'tomorrow',this.value)">${getDayNote(dayNum,'tomorrow')}</textarea>
    </div>
  `;
}

function toggleHour(i) {
  const body = document.getElementById('hbody-'+i);
  body.classList.toggle('open');
}


function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function exportProgress() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const date = new Date().toISOString().slice(0,10);
  a.download = 'java_prep_backup_' + date + '.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exported: java_prep_backup_' + date + '.json');
}

function importProgress(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      if (typeof imported !== 'object' || Array.isArray(imported)) throw new Error('bad');
      state = imported;
      save();
      renderSidebar();
      renderDay(currentDay);
      showToast('Progress imported successfully');
    } catch(err) {
      showToast('Import failed — invalid file');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

updateOverall();
renderSidebar();
renderDay(1);
</script>
</body>
</html>
